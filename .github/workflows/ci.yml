name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forbidden-files:
    name: Forbidden File Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if sensitive files are present
        run: |
          FORBIDDEN=(
            "docs/"
            "TODO.md"
            "TASK.md"
            "CLAUDE.md"
            "AGENTS.md"
            "GEMINI.md"
            ".claude/"
            "admin-panel/"
            ".firebase/"
            "yapılanlar"
          )
          FOUND=0
          for pattern in "${FORBIDDEN[@]}"; do
            if git ls-files --error-unmatch "$pattern" 2>/dev/null || \
               git ls-files | grep -q "^${pattern}"; then
              echo "❌ Forbidden path in repo: $pattern"
              FOUND=1
            fi
          done
          # Check for .env files
          if git ls-files | grep -qE '\.env(\.|$)'; then
            echo "❌ .env file detected in repo"
            git ls-files | grep -E '\.env(\.|$)'
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "Push rejected: sensitive files must not be committed."
            exit 1
          fi
          echo "✅ No forbidden files found."

  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --no-pub

  dotnet-test:
    name: .NET Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/Karar.UnitTests/Karar.UnitTests.csproj

      - name: Test
        run: >
          dotnet test tests/Karar.UnitTests/Karar.UnitTests.csproj
          --no-restore
          --verbosity minimal

  migration-check:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    needs: [forbidden-files]
    steps:
      - uses: actions/checkout@v4

      - name: Detect duplicate migration version numbers
        run: |
          # V3, V7, V30 are legacy duplicates created before this check was added.
          # They are safe: MigrationsRunner stores the full filename as the version key,
          # so both files ran and are recorded separately in schema_migrations.
          KNOWN_LEGACY_DUPS="3 7 30"

          DUPS=$(ls backend/migrations/V*.sql 2>/dev/null \
            | xargs -I{} basename {} .sql \
            | sed 's/^[Vv]\([0-9]*\)__.*/\1/' \
            | sort | uniq -d)

          NEW_DUPS=""
          for v in $DUPS; do
            if ! echo "$KNOWN_LEGACY_DUPS" | grep -qw "$v"; then
              NEW_DUPS="$NEW_DUPS $v"
            fi
          done

          if [ -n "$NEW_DUPS" ]; then
            echo "❌ New duplicate migration version(s): $NEW_DUPS"
            echo "Each new version number must be unique. Conflicting files:"
            for v in $NEW_DUPS; do
              ls backend/migrations/V${v}__*.sql 2>/dev/null
            done
            exit 1
          fi

          COUNT=$(ls backend/migrations/V*.sql 2>/dev/null | wc -l)
          LEGACY_COUNT=$(echo "$DUPS" | wc -w)
          echo "✅ Migration check passed — $COUNT files, legacy duplicates: V3/V7/V30 (grandfathered)."

  container-build:
    name: Container Build & Security Scan
    runs-on: ubuntu-latest
    needs: [forbidden-files, dotnet-test, migration-check]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Karar.Api/Dockerfile
          push: false
          load: true
          tags: karar-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: karar-api:${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.spdx.json
          format: spdx-json

      - name: Vulnerability scan — SARIF upload
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: karar-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: container

      - name: Block on CRITICAL/HIGH vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: karar-api:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy-staging:
    name: Deploy to Staging (Render)
    runs-on: ubuntu-latest
    needs: [flutter-test, container-build]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: staging
    steps:
      - name: Trigger Render staging deploy
        run: |
          if [ -z "${{ secrets.STAGING_RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️ STAGING_RENDER_DEPLOY_HOOK_URL not configured — staging deploy skipped."
            echo "Configure: repo Settings → Environments → staging → Secrets."
            exit 0
          fi
          echo "Triggering Render staging deploy for $GITHUB_SHA..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${{ secrets.STAGING_RENDER_DEPLOY_HOOK_URL }}")
          echo "Deploy hook HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Staging deploy hook returned unexpected status: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Staging deploy triggered."

      - name: Wait for Render staging to build and start
        run: |
          if [ -z "${{ secrets.STAGING_RENDER_DEPLOY_HOOK_URL }}" ]; then
            exit 0
          fi
          echo "Waiting 90s for Render staging to build and start..."
          sleep 90

      - name: Staging readiness check
        id: staging-ready
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "⚠️ STAGING_API_URL not configured — readiness check skipped."
            exit 0
          fi
          MAX_RETRIES=8
          RETRY_DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 \
              "${STAGING_API_URL}/health/ready" || echo "000")
            echo "⏳ Attempt $i/$MAX_RETRIES: /health/ready → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              VERSION=$(curl -s --max-time 10 "${STAGING_API_URL}/health/version" || echo "{}")
              echo "Staging version: $(echo "$VERSION" | jq -r '.commitSha // "unknown"')"
              echo "✅ Staging /health/ready passed."
              exit 0
            fi
            sleep $RETRY_DELAY
          done
          echo "❌ Staging readiness check failed after $MAX_RETRIES attempts."
          exit 1

  smoke-staging:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test against staging
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          if [ -z "$STAGING_API_URL" ]; then
            echo "⚠️ STAGING_API_URL not configured — smoke test skipped."
            exit 0
          fi
          pwsh -File scripts/smoke-api.ps1 -BaseUrl "$STAGING_API_URL"

  release-gate:
    name: Release Gate (SLO Budget)
    runs-on: ubuntu-latest
    needs: [forbidden-files, flutter-test, dotnet-test, migration-check, container-build, smoke-staging]
    # Only runs on actual pushes to main — smoke-staging also runs on main, so the dependency is safe.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Detect hotfix bypass
        id: bypass
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi '\[hotfix\]'; then
            echo "bypass=true" >> "$GITHUB_OUTPUT"
            echo "⚡ Hotfix bypass detected — SLO gate skipped."
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Query SLO health endpoint
        if: steps.bypass.outputs.bypass == 'false'
        env:
          API_URL: ${{ secrets.KARAR_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "KARAR_API_URL secret not configured — gate skipped (fail-open until staging is live)."
            exit 0
          fi

          RESPONSE=$(curl -sf --max-time 15 "$API_URL/health/slo") || {
            echo "SLO endpoint unreachable ($API_URL/health/slo) — gate skipped."
            exit 0
          }

          echo "--- SLO snapshot ---"
          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
          echo "--------------------"

          FIRING=$(echo "$RESPONSE" | jq -r '
            .burnRatePolicies[]
            | select(.severity == "page" and .status == "alert")
            | "  - \(.name): \(.burnRate)x (threshold=\(.threshold)x)"
          ')

          if [ -n "$FIRING" ]; then
            echo ""
            echo "RELEASE BLOCKED -- critical burn-rate policies are firing:"
            echo "$FIRING"
            echo ""
            echo "Fix the underlying reliability issue before deploying new features."
            echo "To deploy an emergency fix, include [hotfix] in the commit message."
            exit 1
          fi

          STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
          echo "SLO gate passed (status=$STATUS)."

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [release-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # configure required reviewers in repo Settings → Environments
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not configured — deploy skipped (configure in repo secrets)."
            exit 0
          fi
          echo "Triggering Render deploy for $GITHUB_SHA..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Deploy hook HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Deploy hook returned unexpected status: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Deploy triggered."

      - name: Wait for Render to build and start
        run: |
          echo "Waiting 120s for Render to build and start the new instance..."
          sleep 120

      - name: Post-deploy health check (readiness + commit SHA)
        id: health
        env:
          API_URL: ${{ secrets.KARAR_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "⚠️ KARAR_API_URL not configured — post-deploy health check skipped."
            exit 0
          fi

          EXPECTED_SHORT="${GITHUB_SHA:0:7}"
          MAX_RETRIES=10
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 \
              "${API_URL}/health/ready" || echo "000")
            echo "⏳ Attempt $i/$MAX_RETRIES: /health/ready → HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "✅ /health/ready passed."

              VERSION=$(curl -s --max-time 10 "${API_URL}/health/version" || echo "{}")
              DEPLOYED_SHA=$(echo "$VERSION" | jq -r '.commitSha // "unknown"')
              echo "Expected SHA prefix : $EXPECTED_SHORT"
              echo "Deployed commitSha  : $DEPLOYED_SHA"

              if [ "$DEPLOYED_SHA" = "unknown" ]; then
                echo "⚠️ commitSha not available (RENDER_GIT_COMMIT may not be set yet). Treat as pass."
              elif echo "$DEPLOYED_SHA" | grep -q "^$EXPECTED_SHORT"; then
                echo "✅ Commit SHA verified."
              else
                echo "⚠️ SHA mismatch — deploy may still be in progress or rolled back on Render side."
              fi

              exit 0
            fi

            sleep $RETRY_DELAY
          done

          echo "❌ Post-deploy health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Post-deploy smoke (lightweight — health + public endpoints only)
        if: success()
        env:
          API_URL: ${{ secrets.KARAR_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "⚠️ KARAR_API_URL not configured — post-deploy smoke skipped."
            exit 0
          fi
          pwsh -File scripts/smoke-api.ps1 -BaseUrl "$API_URL" -SkipWriteChecks

      - name: Rollback on health check failure
        if: failure() && steps.health.outcome == 'failure'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ RENDER_API_KEY or RENDER_SERVICE_ID not set."
            echo "Manual rollback: Render Dashboard → service → Deploys → select last live deploy → Rollback."
            exit 0
          fi

          echo "Fetching recent deploys to find last healthy commit..."
          DEPLOYS=$(curl -s --max-time 15 \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=10")

          PREV_ID=$(echo "$DEPLOYS" | jq -r '
            [.[] | select(.deploy.status == "live")] | .[1].deploy.id // empty
          ')

          if [ -z "$PREV_ID" ]; then
            echo "⚠️ No previous live deploy found — skipping automatic rollback."
            exit 0
          fi

          echo "Rolling back to deploy $PREV_ID..."
          curl -s -X POST --max-time 15 \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$PREV_ID/rollback"
          echo "Rollback initiated. Monitor at: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys"
