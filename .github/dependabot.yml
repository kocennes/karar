version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - flutter

  - package-ecosystem: nuget
    directory: /backend/Karar.Api
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dotnet

  - package-ecosystem: docker
    directory: /backend/Karar.Api
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Istanbul
    labels:
      - dependencies
      - ci
