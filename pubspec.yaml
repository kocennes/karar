name: karar
description: "Topluluk yargılama uygulaması."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Firebase / Push + Analytics + Crashlytics + Performance + Remote Config
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_performance: ^0.10.0+8
  firebase_remote_config: ^5.1.3

  # Ads
  google_mobile_ads: ^5.1.0

  # Google Sign-In
  google_sign_in: ^6.2.1
  firebase_auth: ^5.3.1

  # Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  confetti: ^0.7.0

  # Haptics
  vibration: ^2.0.1

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # Local storage (non-sensitive)
  shared_preferences: ^2.3.2

  # App Review
  in_app_review: ^2.0.9

  # Sharing
  share_plus: ^10.1.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Settings
  app_settings: ^6.1.1

  # URL Launching
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - logo/
    - docs/legal.md
    - docs/privacy.md
    - docs/community-guidelines.md
    - docs/content-policy.md
